name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (GCC ${{ matrix.gcc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Eigen
        uses: actions/checkout@v4
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }} \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS (AppleClang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Eigen
        uses: actions/checkout@v4
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Eigen
        uses: actions/checkout@v4
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build `
            -DSKIGEN_BUILD_TESTS=ON `
            -DSKIGEN_BUILD_EXAMPLES=ON `
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
