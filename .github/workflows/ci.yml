# Pull Request Pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Triggered on pull requests targeting `staging` or `main`.
#
# This is the FEATURE BRANCH pipeline:
#   • Verifies the project builds across all platforms
#   • Runs the full test suite
#   • Builds examples and benchmarks
#   • No deployments, no releases
#
# Branch model:  Feature → Staging → Main
# ═══════════════════════════════════════════════════════════════════════════

name: Pull Request

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-registry:
    name: Docs Registry Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Audit API registry
        run: python3 doc/audit_api_registry.py --repo-root . --registry doc/api_registry.json

  build-linux:
    name: Linux (GCC ${{ matrix.gcc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }} \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    name: macOS (AppleClang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build `
            -DSKIGEN_BUILD_TESTS=ON `
            -DSKIGEN_BUILD_EXAMPLES=ON `
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
