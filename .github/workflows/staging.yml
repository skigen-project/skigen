# Staging Branch Pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Triggered on pushes to `staging`.
#
# This is the DEVELOPMENT pipeline:
#   • Full build + test across all platforms
#   • Builds examples and benchmarks
#   • Deploys dev website
#
# Branch model:  Feature → Staging → Main
# ═══════════════════════════════════════════════════════════════════════════

name: Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux (GCC ${{ matrix.gcc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }} \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install (smoke test)
        run: |
          cmake --install build --prefix ${{ runner.temp }}/skigen-install
          ls -la ${{ runner.temp }}/skigen-install/include/skigen/Skigen/

  build-macos:
    name: macOS (AppleClang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows (MSVC)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build `
            -DSKIGEN_BUILD_TESTS=ON `
            -DSKIGEN_BUILD_EXAMPLES=ON `
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  deploy-dev-website:
    name: Deploy Dev Website
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: doc/website/package-lock.json

      - name: Install dependencies
        working-directory: doc/website
        run: npm ci

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate API docs
        working-directory: doc
        run: |
          doxygen Doxyfile
          python3 doxygen2mdx.py \
            --xml-dir doxygen_output/xml \
            --out-dir website/docs/api \
            --generate-sidebars

      # ── Render example plots on the fly ─────────────────────────────
      # See main.yml for the rationale. Plots are produced fresh on every
      # deploy and never committed to the repo.
      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Checkout SkigenPlot
        uses: actions/checkout@v5
        with:
          repository: skigen-project/skigen-plot
          path: skigen-plot

      - name: Download Qt6 (mne-cpp pre-built binaries)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download qt_binaries -R mne-tools/mne-cpp \
            -p 'qt6_6111_dynamic_binaries_linux.tar.gz' -D /tmp
          mkdir -p "$RUNNER_TEMP/qt"
          tar xzf /tmp/qt6_6111_dynamic_binaries_linux.tar.gz -C "$RUNNER_TEMP/qt"
          echo "QT_ROOT_DIR=$RUNNER_TEMP/qt" >> "$GITHUB_ENV"
          echo "Qt6_DIR=$RUNNER_TEMP/qt/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$RUNNER_TEMP/qt" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/qt/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (OpenGL/Vulkan dev + xcb + xvfb)
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libvulkan-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1 libxcb-glx0 libxcb-keysyms1 libxcb-image0 libxcb-shm0 \
            libxcb-icccm4 libxcb-sync1 libxcb-xfixes0 libxcb-shape0 \
            libxcb-randr0 libxcb-render-util0 libxcb-cursor0 \
            libfontconfig1 libgl1-mesa-dri mesa-vulkan-drivers xvfb

      - name: Configure plot examples
        run: |
          cmake -B build-plot \
            -DSKIGEN_BUILD_TESTS=OFF \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_WITH_PLOT=ON \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/qt;${{ github.workspace }}/skigen-plot"

      - name: Render example plots
        run: |
          # Runs every example registered via skigen_enable_plot(<tgt> <stem>),
          # writing <stem>_{dark,light}.png into doc/website/static/img/examples/
          # (git-ignored — consumed by the site build, never committed).
          xvfb-run -a cmake --build build-plot \
            --target skigen_render_example_plots
          ls -la doc/website/static/img/examples
          python3 doc/audit_api_registry.py \
            --repo-root . \
            --registry doc/api_registry.json \
            --check-rendered-plots doc/website/static/img/examples

      - name: Build (dev)
        working-directory: doc/website
        env:
          SKIGEN_SITE_ENV: dev
          DOCUSAURUS_BASE_URL: /dev/
        run: npm run build

      - name: Deploy to skigen-project.github.io/dev/
        env:
          SKIGEN_PROJECT_PAT: ${{ secrets.SKIGEN_PROJECT_PAT }}
        run: |
          git config --global user.email "deploy@skigen-project.github.io"
          git config --global user.name "skigen-deploy"
          git clone -b main --single-branch "https://${SKIGEN_PROJECT_PAT}@github.com/skigen-project/skigen-project.github.io.git"
          cd skigen-project.github.io

          # Only update the /dev subdirectory — preserve stable root docs
          rm -rf dev
          mkdir -p dev
          cp -r ../doc/website/build/. dev/
          touch .nojekyll

          git add .
          git commit -m "Deploy dev website from staging@${GITHUB_SHA::8}" --allow-empty
          git push origin main
