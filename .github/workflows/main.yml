# Main Branch / Release Pipeline
# ═══════════════════════════════════════════════════════════════════════════
#
# Triggered on pushes to `main` and version tags (v*).
#
# ┌────────────────────┬────────────────────────────────────────────────────┐
# │ Trigger            │ What runs                                         │
# ├────────────────────┼────────────────────────────────────────────────────┤
# │ Push to main       │ Tests + build matrix, deploy production website   │
# ├────────────────────┼────────────────────────────────────────────────────┤
# │ Tag v* on main     │ GitHub Release with header-only tarball           │
# └────────────────────┴────────────────────────────────────────────────────┘
#
# To cut a release:
#   git tag v1.0.0 -a -m "Release v1.0.0"
#   git push origin v1.0.0
#
# Branch model:  Feature → Staging → Main
# ═══════════════════════════════════════════════════════════════════════════

name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & test (skipped on tag pushes to avoid duplicate runs) ────────
  build-linux:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Linux (GCC ${{ matrix.gcc }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }} \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-macos:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: macOS (AppleClang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build \
            -DSKIGEN_BUILD_TESTS=ON \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: Windows (MSVC)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Configure
        run: |
          cmake -B build `
            -DSKIGEN_BUILD_TESTS=ON `
            -DSKIGEN_BUILD_EXAMPLES=ON `
            -DSKIGEN_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # ── Deploy production website (on main push, not on tags) ────────────────
  deploy-website:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: [build-linux, build-macos, build-windows]
    name: Deploy Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: doc/website/package-lock.json

      - name: Install dependencies
        working-directory: doc/website
        run: npm ci

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate API docs
        working-directory: doc
        run: |
          doxygen Doxyfile
          python3 doxygen2mdx.py \
            --xml-dir doxygen_output/xml \
            --out-dir website/docs/api \
            --generate-sidebars

      # ── Render example plots on the fly ─────────────────────────────
      # Build SkigenPlot + the ex_kmeans example and run it under xvfb
      # to produce fresh PNGs that the website consumes. Plots are NOT
      # committed to the repo. Uses mne-cpp pre-built Qt 6.11.1 binaries.
      - name: Checkout Eigen
        uses: actions/checkout@v5
        with:
          repository: skigen-project/eigen
          ref: '3.4'
          path: eigen

      - name: Checkout SkigenPlot
        uses: actions/checkout@v5
        with:
          repository: skigen-project/skigen-plot
          path: skigen-plot

      - name: Download Qt6 (mne-cpp pre-built binaries)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download qt_binaries -R mne-tools/mne-cpp \
            -p 'qt6_6111_dynamic_binaries_linux.tar.gz' -D /tmp
          mkdir -p "$RUNNER_TEMP/qt"
          tar xzf /tmp/qt6_6111_dynamic_binaries_linux.tar.gz -C "$RUNNER_TEMP/qt"
          echo "QT_ROOT_DIR=$RUNNER_TEMP/qt" >> "$GITHUB_ENV"
          echo "Qt6_DIR=$RUNNER_TEMP/qt/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$RUNNER_TEMP/qt" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/qt/bin" >> "$GITHUB_PATH"

      - name: Install dependencies (OpenGL dev + xcb runtime + xvfb)
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libxcb1 libxcb-glx0 libxcb-keysyms1 libxcb-image0 libxcb-shm0 \
            libxcb-icccm4 libxcb-sync1 libxcb-xfixes0 libxcb-shape0 \
            libxcb-randr0 libxcb-render-util0 libxcb-cursor0 \
            libxkbcommon0 libxkbcommon-x11-0 libfontconfig1 \
            libgl1-mesa-dri libvulkan1 mesa-vulkan-drivers xvfb

      - name: Build plot example
        run: |
          cmake -B build-plot \
            -DSKIGEN_BUILD_TESTS=OFF \
            -DSKIGEN_BUILD_EXAMPLES=ON \
            -DSKIGEN_WITH_PLOT=ON \
            -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/qt;${{ github.workspace }}/skigen-plot"
          cmake --build build-plot --target ex_kmeans -j$(nproc)

      - name: Render example plots
        run: |
          mkdir -p doc/website/static/img/plots
          xvfb-run -a ./build-plot/examples/ex_kmeans \
            doc/website/static/img/plots
          ls -la doc/website/static/img/plots

      - name: Build (production)
        working-directory: doc/website
        env:
          SKIGEN_SITE_ENV: stable
        run: npm run build

      - name: Deploy to skigen-project.github.io
        env:
          SKIGEN_PROJECT_PAT: ${{ secrets.SKIGEN_PROJECT_PAT }}
        run: |
          git config --global user.email "deploy@skigen-project.github.io"
          git config --global user.name "skigen-deploy"
          git clone -b main --single-branch "https://${SKIGEN_PROJECT_PAT}@github.com/skigen-project/skigen-project.github.io.git"
          cd skigen-project.github.io

          # Preserve /dev directory (staging website)
          if [ -d "dev" ]; then
            cp -r dev /tmp/website-dev-backup
          fi

          # Remove everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy the stable Docusaurus build to the root
          cp -r ../doc/website/build/. .
          touch .nojekyll

          # Restore /dev directory
          if [ -d "/tmp/website-dev-backup" ]; then
            cp -r /tmp/website-dev-backup dev
          fi

          git add .
          git commit -m "Deploy website from skigen@${GITHUB_SHA::8}" --allow-empty
          git push origin main

  # ── GitHub Release (on version tags only) ────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Package headers
        run: |
          mkdir -p skigen-${{ steps.version.outputs.version }}
          cp -r Skigen skigen-${{ steps.version.outputs.version }}/
          cp -r cmake  skigen-${{ steps.version.outputs.version }}/
          cp CMakeLists.txt LICENSE README.md skigen-${{ steps.version.outputs.version }}/
          tar czf skigen-${{ steps.version.outputs.version }}.tar.gz \
            skigen-${{ steps.version.outputs.version }}/
          sha256sum skigen-${{ steps.version.outputs.version }}.tar.gz \
            > skigen-${{ steps.version.outputs.version }}.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Skigen v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            skigen-${{ steps.version.outputs.version }}.tar.gz
            skigen-${{ steps.version.outputs.version }}.tar.gz.sha256
