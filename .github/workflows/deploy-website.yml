#
# Manual website deployment — use staging.yml / main.yml for automated deploys.
# Kept for manual re-deployment via workflow_dispatch.

name: Deploy Website (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doc/website/package-lock.json

      - name: Install dependencies
        working-directory: doc/website
        run: npm ci

      - name: Build
        working-directory: doc/website
        run: npm run build

      - name: Deploy to skigen-project.github.io
        env:
          SKIGEN_PROJECT_PAT: ${{ secrets.SKIGEN_PROJECT_PAT }}
        run: |
          git config --global user.email "deploy@skigen-project.github.io"
          git config --global user.name "skigen-deploy"
          git clone -b main --single-branch "https://${SKIGEN_PROJECT_PAT}@github.com/skigen-project/skigen-project.github.io.git"
          cd skigen-project.github.io

          # Remove everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy the Docusaurus build output
          cp -r ../doc/website/build/. .
          touch .nojekyll

          git add .
          git commit -m "Deploy website from skigen@${GITHUB_SHA::8}" --allow-empty
          git push origin main
