# Website deployment is handled by the skigen-project.github.io repository.
# This workflow triggers it after doc/website changes land on main.

name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'doc/website/**'
  workflow_dispatch:

jobs:
  trigger-deploy:
    name: Trigger skigen-project.github.io rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          repository: skigen-project/skigen-project.github.io
          event-type: deploy-website
