#
# Builds the Docusaurus website and pushes the generated files to
# skigen-project.github.io so that the deployed content is inspectable.

name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'doc/website/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: doc/website/package-lock.json

      - name: Install dependencies
        working-directory: doc/website
        run: npm ci

      - name: Build
        working-directory: doc/website
        run: npm run build

      - name: Deploy to skigen-project.github.io
        env:
          GIT_CREDENTIALS: ${{ secrets.GIT_CREDENTIALS }}
        run: |
          git config --global user.email "deploy@skigen-project.github.io"
          git config --global user.name "skigen-deploy"
          git clone -b main --single-branch "https://${GIT_CREDENTIALS}@github.com/skigen-project/skigen-project.github.io.git"
          cd skigen-project.github.io

          # Remove everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # Copy the Docusaurus build output
          cp -r ../doc/website/build/. .
          touch .nojekyll

          git add .
          git commit -m "Deploy website from skigen@${GITHUB_SHA::8}" --allow-empty
          git push origin main
