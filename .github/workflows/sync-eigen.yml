name: Sync Eigen Mirror

on:
  schedule:
    # Daily at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Eigen from GitLab to GitHub
        env:
          SKIGEN_PROJECT_PAT: ${{ secrets.SKIGEN_PROJECT_PAT }}
        run: |
          if [ -z "${SKIGEN_PROJECT_PAT}" ]; then
            echo "::error::SKIGEN_PROJECT_PAT secret is not set or has expired. Generate a new fine-grained PAT with Contents read/write scope for skigen-project/eigen and update the repository secret."
            exit 1
          fi

          git clone --mirror https://gitlab.com/libeigen/eigen.git eigen-mirror
          cd eigen-mirror

          # Push all refs (branches, tags) to the GitHub mirror
          git remote set-url origin "https://x-access-token:${SKIGEN_PROJECT_PAT}@github.com/skigen-project/eigen.git"
          git push origin --mirror --force
